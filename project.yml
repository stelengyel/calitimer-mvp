name: CaliTimer
options:
  bundleIdPrefix: com.calitimer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  indentWidth: 4
  tabWidth: 4
  usesTabs: false

settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_TESTABILITY: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  CaliTimer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CaliTimer
        excludes:
          - "**/.DS_Store"
    resources:
      - path: CaliTimer/Resources
    info:
      path: CaliTimer/Info.plist
      properties:
        CFBundleDisplayName: CaliTimer
        CFBundleIdentifier: com.calitimer.app
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calitimer.app
        INFOPLIST_FILE: CaliTimer/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
